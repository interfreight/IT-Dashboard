<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interfreight IT Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#f4f6f9;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:250px;
height:100vh;
background:#0D3B66;
color:white;
padding:20px;
}

.sidebar h2{
margin-bottom:20px;
}

.sidebar p{
opacity:.8;
}

.main{
margin-left:250px;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.user-info{
font-size:14px;
color:#666;
margin-top:5px;
}

.logout{
background:red;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
border-radius:5px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
margin-bottom:20px;
}

.stats{
display:flex;
gap:20px;
margin-bottom:20px;
}

.stat-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
width:250px;
}

.stat-card h3{
color:#666;
margin-bottom:10px;
}

.stat-card h1{
color:#0D3B66;
}

.add-btn{
background:#0D3B66;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
border-radius:5px;
}
.logo-container img{
    width:140px;
    height:auto;
    display:block;
    margin:auto;
    background:white;
    padding:10px;
    border-radius:12px;
}
table{
width:100%;
border-collapse:collapse;
}

th{
background:#0D3B66;
color:white;
padding:12px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
}

.edit-btn{
background:orange;
color:white;
border:none;
padding:6px 10px;
cursor:pointer;
}

.delete-btn{
background:red;
color:white;
border:none;
padding:6px 10px;
cursor:pointer;
}

.modal{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
}

.modal-content{
background:white;
width:500px;
padding:20px;
margin:50px auto;
border-radius:10px;
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
}

.save-btn{
background:#0D3B66;
color:white;
border:none;
padding:10px;
width:100%;
cursor:pointer;
}

</style>
</head>

<body>

<script>

const LOGIN_URL =
"https://interfreight.github.io/login/";

const currentUser =
JSON.parse(localStorage.getItem("currentUser"));

if(!currentUser){

window.location.href = LOGIN_URL;

}

if(currentUser.role !== "IT"){

localStorage.removeItem("currentUser");

window.location.href = LOGIN_URL;

}

</script>

<div class="sidebar">

<div class="logo-container">
    <img src="3. INTERFREIGHT COMPANY LOGO.png" alt="Interfreight Logo">
</div>

<h2>INTERFREIGHT</h2>

<p>IT Dashboard</p>

<hr style="margin:20px 0;">

<div id="loggedUser"></div>

</div>

<div class="main">

<div class="header">

<div>

<h1>User Management</h1>

<div class="user-info" id="welcomeUser"></div>

</div>

<button class="logout" onclick="logout()">
Logout
</button>

</div>

<div class="stats">

<div class="stat-card">
<h3>Total Users</h3>
<h1 id="totalUsers">0</h1>
</div>

</div>

<div class="card">

<button class="add-btn" onclick="openModal()">
+ Add User
</button>

</div>

<div class="card">

<table>

<thead>
<tr>
<th>ID</th>
<th>Username</th>
<th>Full Name</th>
<th>Email</th>
<th>Role</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="userTable"></tbody>

</table>

</div>

</div>

<div class="modal" id="userModal">

<div class="modal-content">

<h2 id="modalTitle">Add User</h2>
<input type="hidden" id="userId">
<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<input type="text" id="fullname" placeholder="Full Name">

<input type="email" id="email" placeholder="Email">

<select id="role">
<option>Administrator</option>
<option>IT</option>
<option>HR</option>
<option>ADMIN</option>
<option>PRESIDENT</option>
<option>BOD</option>
<option>TRANSPORT MANAGER</option>
<option>OPERATIONS MANAGER</option>
<option>SALES MANAGER</option>
<option>ACCOUNTING MANAGER</option>
<option>FORWARDING MANAGER</option>
<option>User</option>
</select>

<select id="status">
<option>Active</option>
<option>Inactive</option>
</select>

<button class="save-btn" onclick="saveUser()">
Save User
</button>

<br><br>

<button onclick="closeModal()">
Close
</button>

</div>

</div>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbwrYXNIm4cLZHV92LTix5e1Pj-11rlPbqVK5ONGi2yXy0vScSAqgngq73uctEv81pMt/exec";

document.getElementById("loggedUser").innerHTML =
currentUser.fullName;

document.getElementById("welcomeUser").innerHTML =
"Welcome, " +
currentUser.fullName +
" (" +
currentUser.role +
")";

function logout(){

localStorage.removeItem("currentUser");

window.location.href =
"https://interfreight.github.io/login/";

}
function editUser(
id,
username,
fullName,
email,
role,
status
){

document.getElementById("modalTitle").innerHTML =
"Edit User";

document.getElementById("userId").value = id;

document.getElementById("username").value = username;

document.getElementById("fullname").value = fullName;

document.getElementById("email").value = email;

document.getElementById("role").value = role;

document.getElementById("status").value = status;

document.getElementById("password").value = "";

document.getElementById("userModal").style.display = "block";

}
  async function saveUser(){

const id =
document.getElementById("userId").value;

if(id){

updateUser();

}else{

addUser();

}

}
async function updateUser(){

const url =
SCRIPT_URL +
"?action=update" +
"&id=" + encodeURIComponent(document.getElementById("userId").value) +
"&username=" + encodeURIComponent(document.getElementById("username").value) +
"&password=" + encodeURIComponent(document.getElementById("password").value) +
"&fullName=" + encodeURIComponent(document.getElementById("fullname").value) +
"&email=" + encodeURIComponent(document.getElementById("email").value) +
"&role=" + encodeURIComponent(document.getElementById("role").value) +
"&status=" + encodeURIComponent(document.getElementById("status").value);

const response = await fetch(url);
const result = await response.json();

if(result.success){

    alert("User updated successfully");

    closeModal();

    loadUsers();

}else{

    alert("Update failed");

}

}
function openModal(){

document.getElementById("modalTitle").innerHTML =
"Add User";

document.getElementById("userId").value = "";

document.getElementById("username").value = "";

document.getElementById("password").value = "";

document.getElementById("fullname").value = "";

document.getElementById("email").value = "";

document.getElementById("role").value = "User";

document.getElementById("status").value = "Active";

document.getElementById("userModal")
.style.display="block";

}

function closeModal(){

document.getElementById("userModal").style.display="none";

document.getElementById("userId").value="";
document.getElementById("username").value="";
document.getElementById("password").value="";
document.getElementById("fullname").value="";
document.getElementById("email").value="";
document.getElementById("role").value="User";
document.getElementById("status").value="Active";

}
async function loadUsers(){

const response =
await fetch(SCRIPT_URL);

const users =
await response.json();

document.getElementById("totalUsers").innerHTML =
users.length;

let html="";

users.forEach(user=>{

html += `
<tr>

<td>${user.id}</td>
<td>${user.username}</td>
<td>${user.fullName}</td>
<td>${user.email}</td>

<td>
<select onchange="changeRole('${user.id}',this.value)">

<option value="Administrator" ${user.role=="Administrator"?"selected":""}>Administrator</option>

<option value="IT" ${user.role=="IT"?"selected":""}>IT</option>

<option value="HR" ${user.role=="HR"?"selected":""}>HR</option>

<option value="ADMIN" ${user.role=="ADMIN"?"selected":""}>ADMIN</option>

<option value="PRESIDENT" ${user.role=="PRESIDENT"?"selected":""}>PRESIDENT</option>

<option value="BOD" ${user.role=="BOD"?"selected":""}>BOD</option>

<option value="TRANSPORT MANAGER" ${user.role=="TRANSPORT MANAGER"?"selected":""}>TRANSPORT MANAGER</option>

<option value="OPERATIONS MANAGER" ${user.role=="OPERATIONS MANAGER"?"selected":""}>OPERATIONS MANAGER</option>

<option value="SALES MANAGER" ${user.role=="SALES MANAGER"?"selected":""}>SALES MANAGER</option>

<option value="ACCOUNTING MANAGER" ${user.role=="ACCOUNTING MANAGER"?"selected":""}>ACCOUNTING MANAGER</option>

<option value="FORWARDING MANAGER" ${user.role=="FORWARDING MANAGER"?"selected":""}>FORWARDING MANAGER</option>

<option value="User" ${user.role=="User"?"selected":""}>User</option>

</select>

</td>

<td>${user.status}</td>

<td>

<button
class="edit-btn"
onclick="editUser(
'${user.id}',
'${user.username}',
'${user.fullName}',
'${user.email}',
'${user.role}',
'${user.status}'
)">
Edit
</button>

<button
class="delete-btn"
onclick="deleteUser('${user.id}')">
Delete
</button>

</td>
</tr>
`;

});

document.getElementById("userTable").innerHTML =
html;

}

async function addUser(){

const url =
SCRIPT_URL +
"?action=add" +
"&username=" + encodeURIComponent(document.getElementById("username").value) +
"&password=" + encodeURIComponent(document.getElementById("password").value) +
"&fullName=" + encodeURIComponent(document.getElementById("fullname").value) +
"&email=" + encodeURIComponent(document.getElementById("email").value) +
"&role=" + encodeURIComponent(document.getElementById("role").value) +
"&status=" + encodeURIComponent(document.getElementById("status").value);

const response = await fetch(url);
const result = await response.json();

if(result.success){

    alert("User saved successfully");

    closeModal();

    loadUsers();

}else{

    alert("Failed to save user");

}

}

async function deleteUser(id){

if(!confirm("Delete this user?")) return;

const response = await fetch(
SCRIPT_URL +
"?action=delete&id=" +
encodeURIComponent(id)
);

const result = await response.json();

if(result.success){
    loadUsers();
}
}

async function changeRole(id,role){

await fetch(
SCRIPT_URL +
"?action=changeRole" +
"&id=" + encodeURIComponent(id) +
"&role=" + encodeURIComponent(role)
);

}


loadUsers();
</script>

</body>
</html>
