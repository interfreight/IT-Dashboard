<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interfreight IT Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#f4f6f9;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:250px;
height:100vh;
background:#0D3B66;
color:white;
padding:20px;
}

.sidebar h2{
margin-bottom:30px;
}

.main{
margin-left:250px;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.logout{
background:red;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
border-radius:5px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
margin-bottom:20px;
}

.add-btn{
background:#0D3B66;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
border-radius:5px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#0D3B66;
color:white;
padding:12px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
}

.edit-btn{
background:orange;
color:white;
border:none;
padding:6px 10px;
cursor:pointer;
}

.delete-btn{
background:red;
color:white;
border:none;
padding:6px 10px;
cursor:pointer;
}

.modal{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
}

.modal-content{
background:white;
width:500px;
padding:20px;
margin:50px auto;
border-radius:10px;
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
}

.save-btn{
background:#0D3B66;
color:white;
border:none;
padding:10px;
width:100%;
cursor:pointer;
}

</style>
</head>
<script>
const user = JSON.parse(localStorage.getItem("currentUser"));

// BLOCK IF NOT LOGGED IN
if(!user){
  window.location.href = "index.html";
}

// BLOCK IF NOT IT ROLE
if(user.role !== "IT"){
  alert("Access denied: IT only system");
  window.location.href = "index.html";
}
</script>
<body>

<div class="sidebar">
<h2>INTERFREIGHT</h2>
<p>IT Dashboard</p>
</div>

<div class="main">

<div class="header">
<h1>User Management</h1>

<button class="logout" onclick="logout()">
Logout
</button>

</div>

<div class="card">

<button class="add-btn" onclick="openModal()">
+ Add User
</button>

</div>

<div class="card">

<table>

<thead>
<tr>
<th>ID</th>
<th>Username</th>
<th>Full Name</th>
<th>Email</th>
<th>Role</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="userTable">

</tbody>

</table>

</div>

</div>

<div class="modal" id="userModal">

<div class="modal-content">

<h2>Add User</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<input type="text" id="fullname" placeholder="Full Name">

<input type="email" id="email" placeholder="Email">

<select id="role">
<option>Administrator</option>
<option>IT</option>
<option>Manager</option>
<option>User</option>
</select>

<select id="status">
<option>Active</option>
<option>Inactive</option>
</select>

<button class="save-btn" onclick="addUser()">
Save User
</button>

<br><br>

<button onclick="closeModal()">
Close
</button>

</div>

</div>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbwrYXNIm4cLZHV92LTix5e1Pj-11rlPbqVK5ONGi2yXy0vScSAqgngq73uctEv81pMt/exec";

function logout(){

localStorage.removeItem("currentUser");

window.location.href="https://interfreight.github.io/login/";

}

function openModal(){

document.getElementById("userModal")
.style.display="block";

}

function closeModal(){

document.getElementById("userModal")
.style.display="none";

}

async function loadUsers(){

const response =
await fetch(SCRIPT_URL);

const users =
await response.json();

let html="";

users.forEach(user=>{

html += `
<tr>

<td>${user.id}</td>
<td>${user.username}</td>
<td>${user.fullName}</td>
<td>${user.email}</td>

<td>

<select onchange="changeRole('${user.id}',this.value)">

<option value="Administrator"
${user.role=="Administrator"?"selected":""}>
Administrator
</option>

<option value="IT"
${user.role=="IT"?"selected":""}>
IT
</option>

<option value="Manager"
${user.role=="Manager"?"selected":""}>
Manager
</option>

<option value="User"
${user.role=="User"?"selected":""}>
User
</option>

</select>

</td>

<td>${user.status}</td>

<td>

<button
class="delete-btn"
onclick="deleteUser('${user.id}')">
Delete
</button>

</td>

</tr>
`;

});

document.getElementById("userTable")
.innerHTML = html;

}

async function addUser(){

    try {

        const response = await fetch(SCRIPT_URL,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                action:"add",
                username:document.getElementById("username").value,
                password:document.getElementById("password").value,
                fullName:document.getElementById("fullname").value,
                email:document.getElementById("email").value,
                role:document.getElementById("role").value,
                status:document.getElementById("status").value
            })
        });

        const result = await response.json();

        console.log(result);

        if(result.success){
            alert("User saved successfully!");
            closeModal();
            loadUsers();
        }else{
            alert(result.message || "Failed to save user");
        }

    } catch(error){

        console.error(error);
        alert("Error: " + error.message);

    }

}

async function deleteUser(id){

if(!confirm("Delete this user?"))
return;

await fetch(SCRIPT_URL,{

method:"POST",

body:JSON.stringify({
action:"delete",
id:id
})

});

loadUsers();

}

async function changeRole(id,role){

await fetch(SCRIPT_URL,{

method:"POST",

body:JSON.stringify({
action:"changeRole",
id:id,
role:role
})

});

}

loadUsers();

</script>

</body>
</html>
