<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Interfreight IT Dashboard</title>

<meta http-equiv="Cache-Control"
content="no-cache, no-store, must-revalidate">

<meta http-equiv="Pragma"
content="no-cache">

<meta http-equiv="Expires"
content="0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#f4f6f9;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:250px;
height:100vh;
background:#0D3B66;
color:white;
padding:20px;
}

.sidebar h2{
margin-bottom:20px;
}

.sidebar p{
opacity:.8;
}

.main{
margin-left:250px;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.user-info{
font-size:14px;
color:#666;
margin-top:5px;
}

.logout{
background:red;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
border-radius:5px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
margin-bottom:20px;
}

.stats{
display:flex;
gap:20px;
margin-bottom:20px;
}

.stat-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
width:250px;
}

.stat-card h3{
color:#666;
margin-bottom:10px;
}

.stat-card h1{
color:#0D3B66;
}

.add-btn{
background:#0D3B66;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
border-radius:5px;
}
.logo-container img{
    width:140px;
    height:auto;
    display:block;
    margin:auto;
    background:white;
    padding:10px;
    border-radius:12px;
}
table{
width:100%;
border-collapse:collapse;
}

th{
background:#0D3B66;
color:white;
padding:12px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
}

.edit-btn{
background:orange;
color:white;
border:none;
padding:6px 10px;
cursor:pointer;
}

.delete-btn{
background:red;
color:white;
border:none;
padding:6px 10px;
cursor:pointer;
}

.modal{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
}

.modal-content{
background:white;
width:500px;
padding:20px;
margin:50px auto;
border-radius:10px;
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
}

.save-btn{
background:#0D3B66;
color:white;
border:none;
padding:10px;
width:100%;
cursor:pointer;
}
</style>
</head>

<body>

<script>

const LOGIN_URL =
"https://interfreight.github.io/login/";

const currentUser =
JSON.parse(localStorage.getItem("currentUser"));

if(!currentUser){

    window.location.replace(LOGIN_URL);

}

const dept =
(currentUser.department || "")
.trim()
.toUpperCase();

if(dept !== "IT"){

    localStorage.clear();

    window.location.replace(LOGIN_URL);

}

</script>

<div class="sidebar">

<div class="logo-container">
    <img src="3. INTERFREIGHT COMPANY LOGO.png" alt="Interfreight Logo">
</div>

<h2>INTERFREIGHT</h2>

<p>IT Dashboard</p>

<hr style="margin:20px 0;">

<div id="loggedUser"></div>

</div>

<div class="main">

<div class="header">

<div>

<h1>User Management</h1>

<div class="user-info" id="welcomeUser"></div>

</div>

<button class="logout" onclick="logout()">
Logout
</button>

</div>

<div class="stats">

<div class="stat-card">
<h3>Total Users</h3>
<h1 id="totalUsers">0</h1>
</div>

</div>

<div class="card">

<button class="add-btn" onclick="openModal()">
+ Add User
</button>

</div>

<div class="card">

<table>
<thead>
<tr>
<th>ID</th>
<th>Username</th>
<th>Full Name</th>
<th>Email</th>
<th>Role</th>
<th>Status</th>
<th>Actions</th>
<th>Department</th>
</tr>
</thead>

<tbody id="userTable"></tbody>

</table>

</div>

</div>

<div class="modal" id="userModal">

<div class="modal-content">

<h2 id="modalTitle">Add User</h2>
<input type="hidden" id="userId">
<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<input type="text" id="full_name" placeholder="Full Name">

<input type="email" id="email" placeholder="Email">

    <select id="department">
<option>Accounting</option>
<option>Sales</option>
<option>Operations</option>
<option>Transport</option>
<option>Forwarding</option>
<option>HR</option>
<option>IT</option>
</select>
    
<select id="role">
<option>Administrator</option>
<option>IT</option>
<option>HR</option>
<option>ADMIN</option>
<option>PRESIDENT</option>
<option>BOD</option>
<option>TRANSPORT MANAGER</option>
<option>OPERATIONS MANAGER</option>
<option>SALES MANAGER</option>
<option>ACCOUNTING MANAGER</option>
<option>FORWARDING MANAGER</option>
<option>User</option>
</select>

<select id="status">
<option>Active</option>
<option>Inactive</option>
</select>

<button class="save-btn" onclick="saveUser()">
Save User
</button>

<br><br>

<button onclick="closeModal()">
Close
</button>

</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const SUPABASE_URL =
'https://tuihpvykuqbqnfyfepql.supabase.co';

const SUPABASE_ANON_KEY =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1aWhwdnlrdXFicW5meWZlcHFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3Mjg4OTcsImV4cCI6MjA5NzMwNDg5N30.HZKS8CgFLjkZ-Bx2AIjFjurH3IsKjvf37Ft852CzJsQ';

const db =
window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

    
document.getElementById("loggedUser").innerHTML =
currentUser.full_name;

document.getElementById("welcomeUser").innerHTML =
"Welcome, " +
currentUser.full_name +
" (" +
currentUser.role +
")";

function logout(){

    localStorage.clear();

    sessionStorage.clear();

    window.location.replace(
        "https://interfreight.github.io/login/"
    );

}
function editUser(
id,
username,
full_name,
email,
role,
status,
department
){

document.getElementById("modalTitle").innerHTML =
"Edit User";

document.getElementById("userId").value = id;

document.getElementById("username").value = username;

document.getElementById("full_name").value = full_name;

document.getElementById("email").value = email;

document.getElementById("role").value = role;

document.getElementById("status").value = status;
    document.getElementById("department").value =
department;

document.getElementById("password").value = "";

document.getElementById("userModal").style.display = "block";

}
  async function saveUser(){

const id =
document.getElementById("userId").value;

if(id){

updateUser();

}else{

addUser();

}

}
async function updateUser(){

    const id =
    document.getElementById("userId").value;

    const { error } = await db
    .from('users')
    .update({
        username: document.getElementById("username").value,
        full_name: document.getElementById("full_name").value,
        email: document.getElementById("email").value,
        role: document.getElementById("role").value,
        department: document.getElementById("department").value,
        status: document.getElementById("status").value
    })
    .eq('id', id);

    if(error){
        alert(error.message);
        return;
    }

    alert("Updated");
    closeModal();
    loadUsers();
}


function openModal(){

document.getElementById("modalTitle").innerHTML =
"Add User";

document.getElementById("userId").value = "";

document.getElementById("username").value = "";

document.getElementById("password").value = "";

document.getElementById("full_name").value = "";

document.getElementById("email").value = "";

document.getElementById("role").value = "User";

document.getElementById("status").value = "Active";
document.getElementById("department").value = "IT";
document.getElementById("userModal")
.style.display="block";

}

function closeModal(){

document.getElementById("userModal").style.display="none";

document.getElementById("userId").value="";
document.getElementById("username").value="";
document.getElementById("password").value="";
document.getElementById("full_name").value="";
document.getElementById("email").value="";
document.getElementById("role").value="User";
document.getElementById("status").value="Active";
    document.getElementById("department").value = "IT";

}
async function loadUsers(){

    const { data: users, error } =
    await db
    .from('users')
    .select('*')
    .order('id');

    if(error){
        console.error(error);
        return;
    }

    document.getElementById("totalUsers").innerHTML =
    users.length;


let html="";

users.forEach(user => {

html += `
<tr>

<td>${user.id}</td>

<td>${user.username}</td>

<td>${user.full_name}</td>

<td>${user.email}</td>

<td>
<select onchange="changeRole('${user.id}',this.value)">

<option value="Administrator" ${user.role=="Administrator"?"selected":""}>Administrator</option>
<option value="IT" ${user.role=="IT"?"selected":""}>IT</option>
<option value="HR" ${user.role=="HR"?"selected":""}>HR</option>
<option value="ADMIN" ${user.role=="ADMIN"?"selected":""}>ADMIN</option>
<option value="PRESIDENT" ${user.role=="PRESIDENT"?"selected":""}>PRESIDENT</option>
<option value="BOD" ${user.role=="BOD"?"selected":""}>BOD</option>
<option value="TRANSPORT MANAGER" ${user.role=="TRANSPORT MANAGER"?"selected":""}>TRANSPORT MANAGER</option>
<option value="OPERATIONS MANAGER" ${user.role=="OPERATIONS MANAGER"?"selected":""}>OPERATIONS MANAGER</option>
<option value="SALES MANAGER" ${user.role=="SALES MANAGER"?"selected":""}>SALES MANAGER</option>
<option value="ACCOUNTING MANAGER" ${user.role=="ACCOUNTING MANAGER"?"selected":""}>ACCOUNTING MANAGER</option>
<option value="FORWARDING MANAGER" ${user.role=="FORWARDING MANAGER"?"selected":""}>FORWARDING MANAGER</option>
<option value="User" ${user.role=="User"?"selected":""}>User</option>

</select>
</td>

<td>${user.status}</td>

<td>

<button
class="edit-btn"
onclick="editUser(
'${user.id}',
'${user.username}',
'${user.full_name}',
'${user.email}',
'${user.role}',
'${user.status}',
'${user.department}'
)">
Edit
</button>

<button
class="delete-btn"
onclick="deleteUser('${user.id}')">
Delete
</button>

</td>

<td>${user.department}</td>

</tr>
`;

});

document.getElementById("userTable").innerHTML =
html;

}

async function addUser(){

    const { error } = await db
    .from('users')
    .insert([{
        username: document.getElementById("username").value,
        password_hash: document.getElementById("password").value,
        full_name: document.getElementById("full_name").value,
        email: document.getElementById("email").value,
        role: document.getElementById("role").value,
        department: document.getElementById("department").value,
        status: document.getElementById("status").value
    }]);

    if(error){
        alert(error.message);
        return;
    }

    alert("User added");
    closeModal();
    loadUsers();
}

async function changeRole(id, role){

    const { error } = await db
    .from('users')
    .update({
        role: role
    })
    .eq('id', id);

    if(error){
        alert(error.message);
        return;
    }

    loadUsers();
}
async function deleteUser(id){

    if(!confirm("Delete user?")) return;

    const { error } =
    await db
    .from('users')
    .delete()
    .eq('id', id);

    if(error){
        alert(error.message);
        return;
    }

    loadUsers();
}
    window.onload = function(){
    loadUsers();
};
</script>
    <script>
window.addEventListener("pageshow", function(event){

    if(
        event.persisted ||
        performance.getEntriesByType("navigation")[0]?.type === "back_forward"
    ){

        if(!localStorage.getItem("currentUser")){

            window.location.replace(
                "https://interfreight.github.io/login/"
            );

        }

    }

});
</script>
</body>
</html>
